<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080d18">
<title>Hassan FX — Trading Journal</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hassan FX">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://idkfnshmbmajkoxixryw.supabase.co">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg:#080d18;--s1:#0e1523;--s2:#141d2e;--s3:#1a2440;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --gold:#f5a623;--gold2:#ffd166;--gold-dim:rgba(245,166,35,0.10);
  --green:#22d47a;--green-dim:rgba(34,212,122,0.10);
  --red:#ff4d6d;--red-dim:rgba(255,77,109,0.10);
  --blue:#4f8ef7;--blue-dim:rgba(79,142,247,0.10);
  --purple:#a78bfa;--purple-dim:rgba(167,139,250,0.10);
  --text:#eef2f8;--text2:#8896b0;--text3:#3d4f6a;
  --r:10px;--mono:'JetBrains Mono',monospace;--sans:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;-webkit-font-smoothing:antialiased;text-rendering:optimizeSpeed;}

.topbar{background:var(--s1);border-bottom:1px solid var(--border2);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:200;gap:1rem;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:30px;height:30px;background:var(--gold);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#000;}
.logo-text{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.3px;}
.logo-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.topbar-stats{display:flex;gap:1.5rem;}
.ts{text-align:right;}
.ts-val{font-size:16px;font-weight:700;font-family:var(--mono);color:var(--gold);}
.ts-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:1px;}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle;}
.sync-ok{background:var(--green);}
.sync-err{background:var(--red);}
.sync-loading{background:var(--gold);animation:pulse 1s infinite;}

.month-nav{display:flex;overflow-x:auto;gap:6px;padding:1rem 1.5rem;background:var(--s1);border-bottom:1px solid var(--border);scrollbar-width:none;position:sticky;top:56px;z-index:100;-webkit-overflow-scrolling:touch;}
.month-nav::-webkit-scrollbar{display:none;}
.mtab{flex-shrink:0;padding:6px 16px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-weight:500;transition:background-color .15s,color .15s,border-color .15s;white-space:nowrap;font-family:var(--sans);}
.mtab:hover{border-color:var(--gold);color:var(--gold);}
.mtab.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700;}
.mtab.has-data::after{content:'';width:5px;height:5px;background:var(--green);border-radius:50%;display:inline-block;margin-left:5px;vertical-align:middle;}
.mtab.goal-done{border-color:var(--green)!important;color:var(--green)!important;}
.mtab.goal-done.active{background:var(--green);color:#000!important;}
.mtab.phase-tab{border-color:var(--purple);color:var(--purple);}
.mtab.phase-tab.active{background:var(--purple);color:#fff;}
.mtab.demo-tab{border-color:var(--blue);color:var(--blue);}
.mtab.demo-tab.active{background:var(--blue);color:#fff;}

main{padding:1.5rem;max-width:1080px;margin:0 auto;}

.month-hero{background:var(--s2);border:1px solid var(--border2);border-radius:14px;padding:1.5rem;margin-bottom:1.25rem;display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:center;}
.mh-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;}
.mh-month{font-size:24px;font-weight:700;letter-spacing:-.5px;}
.mh-sub{font-size:12px;color:var(--text2);margin-top:4px;}
.mh-sub span{color:var(--gold);font-family:var(--mono);}
.mh-balance{text-align:right;}
.mh-bal-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.mh-bal-val{font-size:28px;font-weight:700;font-family:var(--mono);transition:color .3s;}
.mh-bal-delta{font-size:13px;margin-top:3px;font-family:var(--mono);}

.prog-wrap{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1.25rem;}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.prog-label{font-size:12px;color:var(--text2);}
.prog-pct{font-size:13px;font-weight:700;font-family:var(--mono);}
.prog-track{background:var(--s3);border-radius:6px;height:10px;overflow:hidden;}
.prog-fill{height:100%;border-radius:6px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.prog-milestones{display:flex;justify-content:space-between;margin-top:6px;}
.prog-m{font-size:10px;color:var(--text3);}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:1.25rem;}
.scard{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:.85rem 1rem;position:relative;overflow:hidden;}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0;}
.scard.gold::before{background:var(--gold);}
.scard.green::before{background:var(--green);}
.scard.red::before{background:var(--red);}
.scard.blue::before{background:var(--blue);}
.scard.purple::before{background:var(--purple);}
.sc-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.sc-val{font-size:22px;font-weight:700;font-family:var(--mono);}
.sc-val.gold{color:var(--gold);}
.sc-val.green{color:var(--green);}
.sc-val.red{color:var(--red);}
.sc-val.blue{color:var(--blue);}
.sc-val.purple{color:var(--purple);}
.sc-sub{font-size:10px;color:var(--text3);margin-top:3px;}

.live-ticker{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:.65rem 1rem;margin-bottom:1.25rem;}
.lt-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.8);}}
.lt-text{font-size:12px;color:var(--text2);font-family:var(--mono);}
.lt-text span{color:var(--text);}

.add-section{background:var(--s2);border:1px solid var(--border2);border-radius:14px;padding:1.25rem;margin-bottom:1.25rem;}
.section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.edit-banner{background:var(--gold-dim);border:1px solid var(--gold);border-radius:8px;padding:8px 12px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;}
.edit-banner span{font-size:12px;color:var(--gold);font-weight:600;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;}
.fg input,.fg select{background:var(--s3);border:1px solid var(--border2);border-radius:7px;color:var(--text);padding:8px 10px;font-size:13px;outline:none;width:100%;font-family:var(--sans);transition:border-color .15s;}
.fg input:focus,.fg select:focus{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold-dim);}
.fg select option{background:var(--s2);}
.form-actions{display:flex;gap:8px;margin-top:12px;align-items:center;flex-wrap:wrap;}
.btn{padding:9px 22px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:background-color .15s,color .15s;font-family:var(--sans);}
.btn-gold{background:var(--gold);color:#000;}
.btn-gold:hover{background:var(--gold2);}
.btn-gold:disabled{opacity:.5;cursor:not-allowed;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:hover{border-color:var(--text2);color:var(--text);}
.rr-preview{font-size:12px;color:var(--text3);font-family:var(--mono);}

.trades-wrap{background:var(--s2);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.tw-header{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.25rem;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
.tw-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;}
.tw-badge{font-size:11px;color:var(--text2);background:var(--s3);padding:3px 10px;border-radius:20px;}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;}
thead th{padding:9px 12px;text-align:left;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:500;background:var(--s3);white-space:nowrap;}
tbody tr{border-top:1px solid var(--border);transition:background-color .1s;}
tbody tr:hover{background:rgba(255,255,255,.02);}
tbody tr.editing-row{background:var(--gold-dim)!important;}
tbody td{padding:9px 12px;font-size:13px;color:var(--text);vertical-align:middle;white-space:nowrap;}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600;}
.bw{background:var(--green-dim);color:var(--green);}
.bl{background:var(--red-dim);color:var(--red);}
.bb{background:var(--blue-dim);color:var(--blue);}
.bo{background:var(--gold-dim);color:var(--gold);}
.src{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;}
.sTP{background:var(--blue-dim);color:var(--blue);}
.sSR{background:var(--purple-dim);color:var(--purple);}
.sEC{background:var(--green-dim);color:var(--green);}
.sHF{background:var(--gold-dim);color:var(--gold);}
.row-actions{display:flex;gap:3px;justify-content:center;}
.edit-btn,.del-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:5px 9px;border-radius:5px;transition:background-color .15s,color .15s;}
.edit-btn{color:var(--text3);}
.edit-btn:hover{color:var(--blue);background:var(--blue-dim);}
.del-btn{color:var(--text3);}
.del-btn:hover{color:var(--red);background:var(--red-dim);}
.edit-btn:disabled,.del-btn:disabled{opacity:.3;cursor:not-allowed;}
.empty-row td{text-align:center;color:var(--text3);padding:3rem;font-size:13px;}
.pnl-cell{font-family:var(--mono);font-weight:600;}
.pnl-pos{color:var(--green);}
.pnl-neg{color:var(--red);}
.entry-cell{font-family:var(--mono);font-size:12px;color:var(--text2);}

/* OVERVIEW */
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem;}
@media(max-width:600px){.ov-grid{grid-template-columns:1fr;}}
.ov-card{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:1.25rem;}
.ov-card-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:1rem;}
.bal-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.bal-item:last-child{border-bottom:none;}
.bi-num{font-size:11px;color:var(--text3);width:18px;flex-shrink:0;}
.bi-info{flex:1;}
.bi-label{font-size:12px;color:var(--text2);}
.bi-bar-wrap{background:var(--s3);border-radius:3px;height:4px;margin-top:4px;overflow:hidden;}
.bi-bar{height:100%;border-radius:3px;transition:width .5s;}
.bi-right{text-align:right;}
.bi-val{font-size:14px;font-weight:700;font-family:var(--mono);}
.bi-pct{font-size:10px;padding:2px 6px;border-radius:4px;margin-top:2px;display:inline-block;}
.pct-pos{background:var(--green-dim);color:var(--green);}
.pct-neg{background:var(--red-dim);color:var(--red);}
.pct-none{color:var(--text3);}
.overall-goal{background:linear-gradient(135deg,var(--s2),var(--s3));border:1px solid var(--gold);border-radius:14px;padding:1.5rem;margin-bottom:1.25rem;text-align:center;}
.og-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:.5rem;}
.og-val{font-size:40px;font-weight:700;font-family:var(--mono);color:var(--gold);}
.og-sub{font-size:13px;color:var(--text2);margin-top:.5rem;}

/* PHASE PLAN */
.phase-header{background:linear-gradient(135deg,var(--s2),var(--s3));border:1px solid var(--border2);border-radius:14px;padding:1.5rem;margin-bottom:1.25rem;text-align:center;}
.phase-header h2{font-size:20px;font-weight:700;color:var(--gold);margin-bottom:.4rem;}
.phase-header p{font-size:13px;color:var(--text2);}
.current-badge{display:inline-block;margin-top:.75rem;background:var(--gold-dim);border:1px solid var(--gold);border-radius:20px;padding:4px 14px;font-size:12px;color:var(--gold);font-weight:600;}
.phases-grid{display:flex;flex-direction:column;gap:14px;margin-bottom:1.25rem;}
.phase-card{background:var(--s2);border:1px solid var(--border2);border-radius:14px;overflow:hidden;transition:border-color .2s;}
.phase-card.active-phase{border-color:var(--gold);}
.phase-card.completed-phase{border-color:var(--green);}
.phase-card.locked-phase{opacity:.6;}
.phase-card-header{display:flex;align-items:center;gap:12px;padding:1rem 1.25rem;border-bottom:1px solid var(--border);}
.phase-num{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex-shrink:0;}
.pn-done{background:var(--green);color:#000;}
.pn-active{background:var(--gold);color:#000;}
.pn-locked{background:var(--s3);color:var(--text3);}
.phase-card-title{flex:1;}
.pct-name{font-size:14px;font-weight:600;color:var(--text);}
.pct-range{font-size:12px;color:var(--text2);margin-top:2px;}
.phase-status-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid transparent;transition:background-color .2s,color .2s;}
.psb-done{background:var(--green-dim);color:var(--green);border-color:var(--green);}
.psb-active{background:var(--gold-dim);color:var(--gold);border-color:var(--gold);}
.psb-locked{background:var(--s3);color:var(--text3);}
.psb-active:hover{background:var(--gold);color:#000;}
.phase-card-body{padding:1rem 1.25rem;}
.phase-months-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:.75rem;}
.pm-item{background:var(--s3);border-radius:8px;padding:8px 10px;display:flex;justify-content:space-between;align-items:center;}
.pm-label{font-size:11px;color:var(--text2);}
.pm-range{font-size:12px;font-weight:600;font-family:var(--mono);color:var(--text);}
.pm-done{border-left:3px solid var(--green);}
.pm-current{border-left:3px solid var(--gold);}
.phase-footer{display:flex;gap:12px;flex-wrap:wrap;margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border);}
.pf-item{font-size:11px;color:var(--text3);}
.pf-item span{color:var(--text2);font-weight:600;}

/* HONDA */
.honda-card{background:linear-gradient(135deg,#1a1200,#0e1523);border:2px solid var(--gold);border-radius:14px;padding:1.5rem;margin-bottom:14px;display:flex;gap:1.5rem;align-items:center;}
.honda-card.locked{border-color:var(--border2);filter:grayscale(1);opacity:.5;}
.honda-img{width:200px;height:120px;object-fit:contain;flex-shrink:0;}
.honda-info{flex:1;}
.honda-title{font-size:18px;font-weight:700;color:var(--gold);margin-bottom:.3rem;}
.honda-sub{font-size:12px;color:var(--text2);margin-bottom:.75rem;}
.honda-lock-msg{font-size:13px;color:var(--text3);font-style:italic;}
.honda-unlocked-msg{font-size:13px;color:var(--green);font-weight:600;}
.honda-prog-wrap{margin-top:.75rem;}
.honda-prog-label{font-size:11px;color:var(--text3);margin-bottom:4px;}
.honda-prog-track{background:var(--s3);border-radius:6px;height:8px;overflow:hidden;}
.honda-prog-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .5s;}

/* LOADING */
.loading-overlay{display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--text3);gap:10px;font-size:13px;}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;left:1.5rem;margin:0 auto;background:var(--s2);border:1px solid var(--border2);border-radius:10px;padding:.75rem 1.25rem;font-size:13px;font-weight:500;z-index:999;transform:translateY(100px);opacity:0;transition:transform .3s,opacity .3s;display:flex;align-items:center;gap:8px;max-width:320px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-color:var(--green);}
.toast.error{border-color:var(--red);}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn .25s ease;}
@media (prefers-reduced-motion:reduce){
  .fade-in{animation:none;}
  .lt-dot,.sync-loading{animation:none;}
  html{scroll-behavior:auto;}
}

/* GOLDEN RULES */
.rules-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:.75rem;}
.rule-item{background:var(--s3);border-radius:8px;padding:10px 12px;}
.rule-num{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
.rule-text{font-size:12px;color:var(--text);line-height:1.5;word-break:break-word;}

/* DISCIPLINE TRACKER */
.discipline-checkin{background:var(--s2);border:1px solid var(--border2);border-radius:14px;padding:1.25rem;margin-bottom:1.25rem;}
.dc-buttons{display:flex;gap:10px;}
.dc-btn{flex:1;padding:16px;border-radius:10px;border:2px solid var(--border2);background:var(--s3);color:var(--text2);font-size:14px;font-weight:700;cursor:pointer;transition:background-color .15s,border-color .15s,color .15s;text-align:center;font-family:var(--sans);}
.dc-btn.clean:hover{border-color:var(--green);color:var(--green);}
.dc-btn.relapse:hover{border-color:var(--red);color:var(--red);}
.dc-btn.active-clean{background:var(--green);color:#000;border-color:var(--green);}
.dc-btn.active-relapse{background:var(--red);color:#fff;border-color:var(--red);}
.dc-extra{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;padding-top:14px;border-top:1px solid var(--border);}
.dc-extra .fg{flex:1;min-width:130px;}
.dc-extra .fg label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;display:block;}
.dc-extra .fg input,.dc-extra .fg select{background:var(--s3);border:1px solid var(--border2);border-radius:7px;color:var(--text);padding:8px 10px;font-size:13px;outline:none;width:100%;font-family:var(--sans);}
.dc-extra .fg input:focus,.dc-extra .fg select:focus{border-color:var(--red);box-shadow:0 0 0 2px var(--red-dim);}

/* PDF BUTTON */
.pdf-btn{padding:8px 18px;border-radius:7px;border:1px solid var(--green);background:var(--green-dim);color:var(--green);cursor:pointer;font-size:13px;font-weight:600;transition:background-color .15s,color .15s;font-family:var(--sans);display:inline-flex;align-items:center;gap:6px;}
.pdf-btn:hover{background:var(--green);color:#000;}

/* PDF PRINT STYLES */
@media print {
  body{background:#fff!important;color:#000!important;}
  .topbar,.month-nav,.add-section,.row-actions,.pdf-btn,.live-ticker,.pdf-section-hide{display:none!important;}
  main{padding:0 1rem!important;max-width:100%!important;}

// ── DATA HELPERS ──────────────────────────────────────────
function tradesForMonthNum(num){ return allTrades.filter(t=>t.month_num===num); }

function demoBalance(monthIdx){
  const num=getMonthDbNum(monthIdx);
  return tradesForMonthNum(num).reduce((a,t)=>a+parseFloat(t.pnl||0),0);
}

function realBalance(phaseIdx, monthIdx){
  const num=(phaseIdx+1)*100 + monthIdx+1;
  const s=PHASE_PLAN[phaseIdx].monthTargets[monthIdx].s;
  return s + tradesForMonthNum(num).reduce((a,t)=>a+parseFloat(t.pnl||0),0);
}

function globalDemoBalance(){
  return allTrades.filter(t=>t.month_num<0).reduce((a,t)=>a+parseFloat(t.pnl||0),0);
}

// Each phase is its own self-contained capital pool (start → target),
// since capital is withdrawn/reset between phases. A phase's balance is
// ALWAYS its own start + the pnl of its own months — independent of
// which phase the user currently has open.
function phaseBalance(phaseNum){
  const ph=PHASE_PLAN[phaseNum-1];
  const lo=phaseNum*100+1, hi=phaseNum*100+ph.monthTargets.length;
  const sum=allTrades.filter(t=>t.month_num>=lo && t.month_num<=hi).reduce((a,t)=>a+parseFloat(t.pnl||0),0);
  return ph.start + sum;
}
function isPhaseDone(phaseNum){
  return phaseBalance(phaseNum) >= PHASE_PLAN[phaseNum-1].target;
}
// Overall $100 → $10,000 journey progress: each phase = 25% of the bar.
function overallProgressPct(){
  let pct=0;
  for(let i=1;i<=4;i++){
    const ph=PHASE_PLAN[i-1];
    const bal=phaseBalance(i);
    if(bal>=ph.target){ pct+=25; continue; }
    const frac=Math.max(0,Math.min(1,(bal-ph.start)/(ph.target-ph.start)));
    pct+=frac*25;
    break;
  }
  return Math.min(100,pct);
}

function stats(arr){
  const closed=arr.filter(t=>t.result!=='Open');
  const wins=closed.filter(t=>t.result==='Win');
  const losses=closed.filter(t=>t.result==='Loss');
  const bes=closed.filter(t=>t.result==='BE');
  const totalPnl=arr.reduce((a,t)=>a+parseFloat(t.pnl||0),0);
  const wr=closed.length?Math.round(wins.length/closed.length*100):0;
  return{total:arr.length,closed:closed.length,wins:wins.length,losses:losses.length,bes:bes.length,totalPnl,wr};
}

function styleFilterHtml(){

  </select>`;
}
function onStyleFilterChange(val){
  styleFilter=val;
  renderPage();
}
function applyStyleFilter(arr){
  if(styleFilter==='All') return arr;
  return arr.filter(t=>t.trading_style===styleFilter);
}

// ── PAIR FILTER (trade log tables) ─────────────────────────
function pairFilterHtml(){
  const opts=[{l:'All',v:'All'},...PAIRS];
  return `<select id="pair-filter-select" onchange="onPairFilterChange(this.value)" style="background:var(--s3);border:1px solid var(--border2);border-radius:7px;color:var(--text);padding:5px 10px;font-size:12px;font-family:var(--sans);">
    ${opts.map(o=>`<option value="${o.v}" ${pairFilter===o.v?'selected':''}>${o.l}</option>`).join('')}
  </select>`;
}
function onPairFilterChange(val){
  pairFilter=val;
  renderPage();
}
function applyPairFilter(arr){
  if(pairFilter==='All') return arr;
  return arr.filter(t=>t.pair===pairFilter);
}

// ── TIME-RANGE FILTER (Demo table only) ────────────────────
function timeRangeFilterHtml(){
  const opts=['All','This Week','This Month','Last 6 Months'];
  return `<select id="time-range-filter-select" onchange="onTimeRangeFilterChange(this.value)" style="background:var(--s3);border:1px solid var(--border2);border-radius:7px;color:var(--text);padding:5px 10px;font-size:12px;font-family:var(--sans);">
    ${opts.map(o=>`<option ${timeRangeFilter===o?'selected':''}>${o}</option>`).join('')}
  </select>`;
}
function onTimeRangeFilterChange(val){
  timeRangeFilter=val;
  renderPage();
}
function applyTimeRangeFilter(arr){
  if(timeRangeFilter==='All') return arr;
  const now=new Date();
  let start;
  if(timeRangeFilter==='This Week'){
    const day=now.getDay(); // 0=Sun..6=Sat
    const diffToMonday=day===0?6:day-1;
    start=new Date(now); start.setDate(now.getDate()-diffToMonday); start.setHours(0,0,0,0);
  } else if(timeRangeFilter==='This Month'){
    start=new Date(now.getFullYear(), now.getMonth(), 1);
  } else if(timeRangeFilter==='Last 6 Months'){
    start=new Date(now.getFullYear(), now.getMonth()-5, 1);
  }
  return arr.filter(t=>t.trade_date && new Date(t.trade_date) >= start);
}

// ── EXCEL EXPORT (Demo Phase only) ─────────────────────────
function exportTradesToExcel(trades, sheetName){
  if(!trades || trades.length===0){ toast('No trades to export for this filter','error'); return; }
  sheetName = sheetName || 'Trades';
  const rows = trades.map(t=>({
    Date: t.trade_date || '',
    Pair: pairLabel(t.pair),
    Direction: t.direction,
    Entry: t.entry_price,
    SL: t.sl,
    TP: t.tp,
    Result: t.result,
    'P&L': t.pnl,
    'Trading Style': t.trading_style || '',
    Confluence: t.confluence || '',
    'Entry Timeframe': t.entry_timeframe || '',
    Session: t.session || '',
    'RR Ratio': t.rr_ratio || '',
    Notes: t.notes || ''
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [10,10,9,9,9,9,9,9,12,12,12,10,9,30].map(w=>({wch:w}));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, sheetName);
  const filename = `hassan-fx-demo-trades-${todayISO()}.xlsx`;
  XLSX.writeFile(wb, filename);
}
function exportDemoTradesClick(monthNum){
  const arr=tradesForMonthNum(monthNum);
  const filtered=applyTimeRangeFilter(applyPairFilter(applyStyleFilter(arr)));
  exportTradesToExcel(filtered, 'Demo Trades');
}

          ${arr.length>0?`<div class="bi-pct ${pnl>=0?'pct-pos':'pct-neg'}">${st.wins}W ${st.losses}L</div>`:'<div class="pct-none bi-pct">—</div>'}
        </div>
      </div>`;
    });
  } else {
    const ph=PHASE_PLAN[activePhase-1];
    ph.monthTargets.forEach((m,i)=>{
      const num=activePhase*100+i+1;
      const arr=tradesForMonthNum(num);
      const bal=realBalance(activePhase-1,i);
      const hasTrades=arr.length>0;
      const pct=hasTrades?((bal-m.s)/m.s*100):null;
      const goalDone=hasTrades&&bal>=m.t;
      html+=`<div class="bal-item">
        <div class="bi-num">${i+1}</div>
        <div class="bi-info">
          <div class="bi-label">${m.l}</div>
          <div class="bi-bar-wrap"><div class="bi-bar" style="width:${hasTrades?Math.min(100,(bal/m.t)*100):0}%;background:${goalDone?'var(--green)':hasTrades?'var(--gold)':'var(--s3)'}"></div></div>
        </div>
        <div class="bi-right">
          <div class="bi-val" style="color:${hasTrades?(goalDone?'var(--green)':'var(--text)'):'var(--text3)'}">
            ${hasTrades?'$'+bal.toFixed(2):'$'+m.t+' target'}
          </div>
          ${pct!==null?`<div class="bi-pct ${pct>=0?'pct-pos':'pct-neg'}">${pct>=0?'+':''}${pct.toFixed(1)}%</div>`:'<div class="pct-none bi-pct">—</div>'}
        </div>
      </div>`;
    });
  }

  html+=`</div><div class="ov-card"><div class="ov-card-title">Trading Style Performance</div>`;
  TRADING_STYLES.forEach(style=>{
    const arr=allTrades.filter(t=>t.trading_style===style);
    const s=stats(arr);
    if(s.total===0){
      html+=`<div class="bal-item"><div class="bi-info"><div class="bi-label">${style}</div></div><div class="bi-right"><div class="bi-val" style="color:var(--text3)">No trades</div></div></div>`;
    } else {
      html+=`<div class="bal-item">
        <div class="bi-info">
          <div class="bi-label">${style}</div>
          <div class="bi-bar-wrap"><div class="bi-bar" style="width:${s.wr}%;background:${s.wr>=60?'var(--green)':s.wr>=40?'var(--gold)':'var(--red)'}"></div></div>
        </div>
        <div class="bi-right">
          <div class="bi-val">${s.wr}% WR</div>
          <div class="bi-pct ${s.totalPnl>=0?'pct-pos':'pct-neg'}">${s.totalPnl>=0?'+':''}$${s.totalPnl.toFixed(2)}</div>
        </div>
      </div>`;
    }
  });
  html+=`</div></div>`;
  document.getElementById('mainContent').innerHTML=html;
}

// ── FORM HELPERS ──────────────────────────────────────────
function previewRR(){
  const entry=parseFloat(document.getElementById('f-entry')?.value);
  const sl=parseFloat(document.getElementById('f-sl')?.value);
  const tp=parseFloat(document.getElementById('f-tp')?.value);
  const pair=document.getElementById('f-pair')?.value;
  const mult=PIP_MULTIPLIER[pair]||10;
  const el=document.getElementById('rr-preview');
  if(!el) return;
  if(entry&&sl&&sl!==entry){
    const risk=Math.abs(entry-sl);
    const slPips=Math.round(risk*mult);
    let txt='SL: '+slPips+' pips';
    let rr=0;
    if(tp){
      const reward=Math.abs(tp-entry);
      const tpPips=Math.round(reward*mult);
      rr=Math.floor(reward/risk);
      txt='SL: '+slPips+' pips  |  TP: '+tpPips+' pips  |  RR: 1:'+rr;
      const rrEl=document.getElementById('f-rr');
      if(rrEl) rrEl.value='1:'+rr;
    }
    el.textContent=txt;
    el.style.color=rr>=2?'var(--green)':'var(--gold)';
  } else {
    if(el) el.textContent='';
  }
}

function onResultChange(){
  const r=document.getElementById('f-result').value;
  const pnlEl=document.getElementById('f-pnl');
  if(!pnlEl) return;
  if(r==='BE') pnlEl.value='0';
  pnlEl.placeholder=r==='Win'?'+15.50':r==='Loss'?'-8.20':r==='BE'?'0.00':'(open)';
}

function onPnlInput(){
  const r=document.getElementById('f-result').value;
  const val=document.getElementById('f-pnl').value;
  const pnl=parseFloat(val);
  if(!isNaN(pnl)){
    if(r==='Win'&&pnl<0) document.getElementById('f-pnl').value=Math.abs(pnl);
    if(r==='Loss'&&pnl>0) document.getElementById('f-pnl').value=-Math.abs(pnl);
  }
}

function onStyleChange(){
  const styleEl=document.getElementById('f-style');
  const confEl=document.getElementById('f-confluence');
  if(!styleEl||!confEl) return;
  const auto=STYLE_CONFLUENCE[styleEl.value];
  if(auto) confEl.value=auto;
}

function clearForm(){
  ['f-entry','f-sl','f-tp','f-pnl','f-rr','f-notes'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.value='';
  });
  const pairEl=document.getElementById('f-pair'); if(pairEl) pairEl.selectedIndex=0;
  const dirEl=document.getElementById('f-dir'); if(dirEl) dirEl.selectedIndex=0;
  const resEl=document.getElementById('f-result'); if(resEl) resEl.selectedIndex=0;
  const styleEl=document.getElementById('f-style'); if(styleEl) styleEl.selectedIndex=0;
  const confEl=document.getElementById('f-confluence'); if(confEl) confEl.selectedIndex=0;
  const tfEl=document.getElementById('f-entry-tf'); if(tfEl) tfEl.selectedIndex=0;
  const sesEl=document.getElementById('f-session'); if(sesEl) sesEl.selectedIndex=0;
  const dateEl=document.getElementById('f-date'); if(dateEl) dateEl.value=todayISO();
  ['f-displacement','f-choch','f-engulf','f-retest'].forEach(id=>{
    const el=document.getElementById(id);

// ── SUBMIT (handles both Add + Update) ───────────────────
async function submitTrade(monthNum){
  const pnlEl=document.getElementById('f-pnl');
  const pnlVal=pnlEl?pnlEl.value.trim():'';
  if(pnlVal===''){ toast('P&L amount required!','error'); return; }
  const pnlNum=parseFloat(pnlVal);
  if(isNaN(pnlNum)){ toast('P&L must be a number!','error'); return; }

  const isEditing=editingTradeId!=null;
  const btn=document.getElementById('add-btn');
  if(btn){btn.disabled=true;btn.textContent=isEditing?'Updating...':'Saving...';}

  const trade={
    month_num: monthNum,
    trade_date: document.getElementById('f-date').value||null,
    pair: document.getElementById('f-pair').value,
    direction: document.getElementById('f-dir').value,
    entry_price: parseFloat(document.getElementById('f-entry').value)||null,
    sl: parseFloat(document.getElementById('f-sl').value)||null,
    tp: parseFloat(document.getElementById('f-tp').value)||null,
    result: document.getElementById('f-result').value,
    pnl: pnlNum,
    rr_ratio: document.getElementById('f-rr').value||null,
    trading_style: document.getElementById('f-style').value,
    confluence: document.getElementById('f-confluence').value,
    entry_timeframe: document.getElementById('f-entry-tf').value,
    session: document.getElementById('f-session').value,
    session_time: SESSION_TIMES[document.getElementById('f-session').value]||null,
    notes: document.getElementById('f-notes').value||null
  };

  const dispEl=document.getElementById('f-displacement');
  if(dispEl){
    trade.displacement = dispEl.checked;
    trade.choch = document.getElementById('f-choch').checked;
    trade.engulf = document.getElementById('f-engulf').checked;
    trade.retest = document.getElementById('f-retest').checked;
  }

  try{
    if(isEditing){
      const updated=await sbUpdate(editingTradeId, trade);
      const idx=allTrades.findIndex(t=>t.id===editingTradeId);
      if(idx>-1) allTrades[idx]=updated[0];
      toast(`✓ Trade updated! PnL: ${pnlNum>=0?'+':''}$${pnlNum.toFixed(2)}`);
      editingTradeId=null;
    } else {
      const inserted=await sbInsert(trade);
      allTrades.push(inserted[0]);
      toast(`✓ Saved! PnL: ${pnlNum>=0?'+':''}$${pnlNum.toFixed(2)}`);
    }
    clearForm();
    renderPage();
  } catch(e){
    toast((isEditing?'Update failed: ':'Save failed: ')+e.message,'error');
    if(btn){btn.disabled=false;btn.textContent=isEditing?'✓ Update Trade':'+ Save to Supabase';}
  }
}

// ── DELETE ────────────────────────────────────────────────
async function removeTrade(id, btn){
  if(!confirm('Delete this trade?')) return;
  if(btn) btn.disabled=true;
  try{
    await sbDelete(id);
    allTrades=allTrades.filter(t=>t.id!==id);
    if(editingTradeId===id){ editingTradeId=null; }
    toast('Trade deleted','error');
    renderPage();
  } catch(e){
    toast('Delete failed: '+e.message,'error');
    if(btn) btn.disabled=false;
  }
}

const CHALLENGE_TARGET = 10000; // cents
const CHALLENGE_DAILY_TARGET = 500; // cents

async function loadChallengeData(force){
  if(challengeData && !force) return challengeData;
  try{
    const res = await fetch(`${SB_URL}/rest/v1/challenge_days?select=*&order=day_num.asc`,{headers:HEADERS});
    if(!res.ok){ challengeData={}; return challengeData; }
    const rows = await res.json();
    const map = {};
    rows.forEach(r=>{ map[r.day_num]=r; });
    challengeData = map;
    return map;
  }catch(e){ challengeData={}; return challengeData; }
}

async function saveChallengDay(dayNum, data){
  const res = await fetch(`${SB_URL}/rest/v1/challenge_days`, {
    method:'POST',
    headers:{...HEADERS,'Prefer':'resolution=merge-duplicates,return=representation'},
    body: JSON.stringify({day_num:dayNum, ...data})
  });
  if(!res.ok){ const e=await res.text(); throw new Error(e); }
  return await res.json();
}

async function renderChallenge(){

  if(!challengeData) document.getElementById('mainContent').innerHTML=loadingHtml;
  const data = await loadChallengeData();

  const totalFilled = Object.values(data).filter(r=>r.ending_balance).length;

    ? Math.max(...Object.values(data).filter(r=>r.ending_balance).map(r=>parseFloat(r.ending_balance)))
    : CHALLENGE_START;
  const prog = Math.min(100,((lastBal-CHALLENGE_START)/(CHALLENGE_TARGET-CHALLENGE_START))*100);
  const done = lastBal >= CHALLENGE_TARGET;

  let html = `

    <div class="current-badge" style="background:var(--green);color:#000;">

    <div class="tbl-wrap">

        <thead><tr>

          <th>Date</th>
          <th>Starting Balance</th>
          <th>Daily Target</th>
          <th>Trades (W/L)</th>
          <th>Result</th>
          <th>Ending Balance</th>
          <th>Notes</th>
          <th></th>
        </tr></thead>
        <tbody>`;

  let runBal = CHALLENGE_START;
  for(let d=1; d<=CHALLENGE_DAYS; d++){
    const row = data[d] || {};
    const endBal = row.ending_balance ? parseFloat(row.ending_balance) : null;
    const isFilled = endBal !== null;
    const gain = isFilled ? endBal - runBal : null;

          onchange="updateChallenge(${d},'trade_date',this.value)">

      <td style="font-family:var(--mono);font-size:12px;color:var(--text2)">${startBal}¢</td>

          <option value="🛑 Loss Day" ${row.result==='🛑 Loss Day'?'selected':''}>🛑 Loss Day</option>
          <option value="⏸️ Rest Day" ${row.result==='⏸️ Rest Day'?'selected':''}>⏸️ Rest Day</option>
        </select>
      </td>

      </td>
      <td>
        <input type="text" value="${row.notes||''}"
          placeholder="Notes..."
          style="background:var(--s3);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:5px 7px;font-size:12px;width:140px;font-family:var(--sans);"

      </td>
      <td>
        ${isFilled?'<span style="color:var(--green);font-size:14px">✓</span>':'<span style="color:var(--text3);font-size:11px">—</span>'}

    </tr>`;
  }

  html += `</tbody></table></div></div>`;
  document.getElementById('mainContent').innerHTML = html;
}

async function updateChallenge(dayNum, field, value){
  try{
    await saveChallengDay(dayNum, {[field]:value||null});
    if(!challengeData) challengeData={};
    challengeData[dayNum] = {...(challengeData[dayNum]||{day_num:dayNum}), [field]:value||null};
    renderChallenge();
  }catch(e){
    toast('Save failed: '+e.message,'error');
  }
}

// ── DISCIPLINE TRACKER ───────────────────────────────────
function todayPKT(){
  const fmt = new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Karachi',year:'numeric',month:'2-digit',day:'2-digit'});
  return fmt.format(new Date()); // YYYY-MM-DD
}

function fmtNiceDate(iso){
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function computeStreaks(entries){
  const sorted=[...entries].sort((a,b)=>a.entry_date.localeCompare(b.entry_date));
  let best=0, run=0, prevDate=null;
  sorted.forEach(e=>{
    if(e.status==='clean'){
      const diff = prevDate ? (new Date(e.entry_date)-new Date(prevDate))/86400000 : null;
      run = (diff===1) ? run+1 : 1;
      if(run>best) best=run;
    } else {
      run=0;
    }
    prevDate=e.entry_date;
  });
  let current=0;
  for(let i=sorted.length-1;i>=0;i--){
    const e=sorted[i];
    if(e.status!=='clean') break;
    if(i===sorted.length-1){ current=1; }
    else{
      const diff=(new Date(sorted[i+1].entry_date)-new Date(e.entry_date))/86400000;
      if(diff===1) current+=1; else break;
    }
  }
  return {current, best};
}

function nextMilestone(current){
  const arr=[7,14,30,60,90,180,365];
  for(const m of arr) if(current<m) return m;
  return current+30;
}

async function loadDisciplineData(force){
  if(disciplineData && !force) return disciplineData;
  try{
    const res = await fetch(`${SB_URL}/rest/v1/discipline_entries?select=*&order=entry_date.desc`,{headers:HEADERS});
    if(!res.ok){ disciplineData=[]; return disciplineData; }
    disciplineData = await res.json();
    return disciplineData;
  }catch(e){ disciplineData=[]; return disciplineData; }
}

async function upsertDisciplineEntry(date, data){
  const res = await fetch(`${SB_URL}/rest/v1/discipline_entries`, {
    method:'POST',
    headers:{...HEADERS,'Prefer':'resolution=merge-duplicates,return=representation'},
    body: JSON.stringify({entry_date:date, ...data})
  });
  if(!res.ok){ const e=await res.text(); throw new Error(e); }
  return await res.json();
}

async function markToday(status){
  const date = todayPKT();
  try{
    const existing = (disciplineData||[]).find(e=>e.entry_date===date);
    const payload = {
      status,
      slept_ok: existing ? existing.slept_ok : true,
      trigger: existing ? existing.trigger : null,
      note: existing ? existing.note : null
    };
    const rows = await upsertDisciplineEntry(date, payload);
    const saved = rows[0];
    if(!disciplineData) disciplineData=[];
    const idx = disciplineData.findIndex(e=>e.entry_date===date);
    if(idx>=0) disciplineData[idx]=saved; else disciplineData.push(saved);
    disciplineData.sort((a,b)=>b.entry_date.localeCompare(a.entry_date));
    renderDiscipline();
    toast(status==='clean'?'Marked clean today ✓':'Relapse logged');
  }catch(e){
    toast('Save failed: '+e.message,'error');
  }
}

async function updateDisciplineField(date, field, value){
  try{
    const entry = disciplineData.find(e=>e.entry_date===date);
    if(!entry) return;
    const payload = {status:entry.status, slept_ok:entry.slept_ok, trigger:entry.trigger, note:entry.note};
    payload[field]=value;
    const rows = await upsertDisciplineEntry(date, payload);
    Object.assign(entry, rows[0]);
    renderDiscipline();
  }catch(e){
    toast('Save failed: '+e.message,'error');
  }
}

async function deleteDisciplineEntry(date){
  if(!confirm('Delete entry for '+fmtNiceDate(date)+'?')) return;
  try{
    const res = await fetch(`${SB_URL}/rest/v1/discipline_entries?entry_date=eq.${date}`,{method:'DELETE',headers:HEADERS});
    if(!res.ok) throw new Error(await res.text());
    disciplineData = disciplineData.filter(e=>e.entry_date!==date);
    renderDiscipline();
    toast('Entry deleted');
  }catch(e){
    toast('Delete failed: '+e.message,'error');
  }
}

async function renderDiscipline(){
  const loadingHtml='<div class="loading-overlay"><div class="spinner"></div> Loading discipline data...</div>';
  if(!disciplineData) document.getElementById('mainContent').innerHTML=loadingHtml;
  const data = await loadDisciplineData();
  const today = todayPKT();
  const todayEntry = data.find(e=>e.entry_date===today);
  const {current, best} = computeStreaks(data);
  const monthPrefix = today.slice(0,7);
  const monthEntries = data.filter(e=>e.entry_date.startsWith(monthPrefix));
  const monthClean = monthEntries.filter(e=>e.status==='clean').length;
  const monthPct = monthEntries.length ? Math.round(monthClean/monthEntries.length*100) : null;
  const nm = nextMilestone(current);
  const prog = Math.min(100, (current/nm)*100);
  const statusMsg = current>0 ? '🔥 '+current+' day streak' : (data.length ? 'Streak broken — restart today' : 'Start your streak today');

  let html = `
  <div class="phase-header fade-in" style="border-color:var(--red);background:linear-gradient(135deg,#1a0d0d,#0e1523);">
    <h2 style="color:var(--red)">🛡️ Discipline Tracker</h2>
    <p>Trading discipline · daily clean streak</p>
    <div class="current-badge" style="background:var(--red-dim);border-color:var(--red);color:var(--red);">${statusMsg}</div>
  </div>

  <div class="prog-wrap fade-in">
    <div class="prog-top">
      <span class="prog-label">Streak Progress · toward ${nm} days</span>
      <span class="prog-pct" style="color:var(--red)">${current}/${nm}</span>
    </div>
    <div class="prog-track">
      <div class="prog-fill" style="width:${prog}%;background:linear-gradient(90deg,var(--red),var(--gold))"></div>
    </div>
  </div>

  <div class="stats-row fade-in">
    <div class="scard green"><div class="sc-lbl">Current Streak</div><div class="sc-val green">${current}</div><div class="sc-sub">days clean</div></div>
    <div class="scard gold"><div class="sc-lbl">Best Streak</div><div class="sc-val gold">${best}</div><div class="sc-sub">days clean</div></div>
    <div class="scard blue"><div class="sc-lbl">This Month</div><div class="sc-val blue">${monthPct===null?'—':monthPct+'%'}</div><div class="sc-sub">${monthEntries.length} logged</div></div>
    <div class="scard purple"><div class="sc-lbl">Total Logged</div><div class="sc-val purple">${data.length}</div><div class="sc-sub">all-time days</div></div>
  </div>

  <div class="discipline-checkin fade-in">
    <div class="section-title">Today · ${fmtNiceDate(today)}</div>
    <div class="dc-buttons">
      <button class="dc-btn clean ${todayEntry?.status==='clean'?'active-clean':''}" onclick="markToday('clean')">✅ Clean Day</button>
      <button class="dc-btn relapse ${todayEntry?.status==='relapse'?'active-relapse':''}" onclick="markToday('relapse')">⚠️ Relapse</button>
    </div>
    ${todayEntry ? `
    <div class="dc-extra">
      <div class="fg">
        <label>Slept OK</label>
        <select onchange="updateDisciplineField('${today}','slept_ok',this.value==='true')">
          <option value="true" ${todayEntry.slept_ok?'selected':''}>Yes</option>
          <option value="false" ${!todayEntry.slept_ok?'selected':''}>No</option>
        </select>
      </div>
      <div class="fg">
        <label>Trigger</label>
        <input type="text" value="${todayEntry.trigger||''}" placeholder="What triggered..." onchange="updateDisciplineField('${today}','trigger',this.value)">
      </div>
      <div class="fg" style="flex:2;">
        <label>Note</label>
        <input type="text" value="${todayEntry.note||''}" placeholder="Notes..." onchange="updateDisciplineField('${today}','note',this.value)">
      </div>
    </div>` : ''}
  </div>

  <div class="trades-wrap fade-in">
    <div class="tw-header">
      <div class="tw-title">History</div>
      <span class="tw-badge">${data.length} entries</span>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Date</th><th>Status</th><th>Slept OK</th><th>Trigger</th><th>Note</th><th></th>
        </tr></thead>
        <tbody>
        ${data.length ? data.map(e=>`
        <tr>
          <td class="entry-cell">${fmtNiceDate(e.entry_date)}</td>
          <td>
            <select onchange="updateDisciplineField('${e.entry_date}','status',this.value)"
              style="background:${e.status==='clean'?'var(--green-dim)':'var(--red-dim)'};color:${e.status==='clean'?'var(--green)':'var(--red)'};border:1px solid ${e.status==='clean'?'var(--green)':'var(--red)'};border-radius:5px;padding:5px 8px;font-size:12px;font-weight:600;font-family:var(--sans);">
              <option value="clean" ${e.status==='clean'?'selected':''}>✅ Clean</option>
              <option value="relapse" ${e.status==='relapse'?'selected':''}>⚠️ Relapse</option>
            </select>
          </td>
          <td>
            <select onchange="updateDisciplineField('${e.entry_date}','slept_ok',this.value==='true')"
              style="background:var(--s3);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:5px 8px;font-size:12px;font-family:var(--sans);">

            <input type="text" value="${e.trigger||''}" placeholder="—"

          </td>
          <td>
            <input type="text" value="${e.note||''}" placeholder="—"
              onchange="updateDisciplineField('${e.entry_date}','note',this.value)"
              style="background:var(--s3);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:5px 7px;font-size:12px;width:160px;font-family:var(--sans);">
          </td>
          <td class="row-actions">
            <button class="del-btn" onclick="deleteDisciplineEntry('${e.entry_date}')" title="Delete">🗑</button>
          </td>
        </tr>`).join('') : '<tr class="empty-row"><td colspan="6">No entries yet. Mark today above to start.</td></tr>'}
        </tbody>
      </table>
    </div>
  </div>`;
  document.getElementById('mainContent').innerHTML = html;
}
